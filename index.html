<!DOCTYPE HTML>
<html>
	<head>
		<title>Igor Szuniewicz</title>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
		<link rel="stylesheet" href="assets/css/main.css" />
	</head>
	<body class="is-preload">

		<!-- Wrapper -->
			<div id="wrapper">

				<!-- Main -->
					<section id="main">
						<header>
							<h1>Igor Szuniewicz</h1>
							<p>Sound Designer | Audio Technician | Game Sound Integrator | Composer</p>
						</header>

						<!-- Slideshow -->
						<div class="slideshow-container">
							<div class="slide fade">
								<img src="images/proj1.jpg" style="width:100%">
								<div class="text">Projekt 1 – opis projektu 1</div>
							</div>

							<div class="slide fade">
								<img src="images/proj2.jpg" style="width:100%">
								<div class="text">Projekt 2 – opis projektu 2</div>
							</div>

							<div class="slide fade">
								<img src="images/proj3.jpg" style="width:100%">
								<div class="text">Projekt 3 – opis projektu 3</div>
							</div>

							<a class="prev" onclick="plusSlides(-1)">&#10094;</a>
							<a class="next" onclick="plusSlides(1)">&#10095;</a>
						</div>
						<br>

						<div style="text-align:center">
							<span class="dot" onclick="currentSlide(1)"></span>
							<span class="dot" onclick="currentSlide(2)"></span>
							<span class="dot" onclick="currentSlide(3)"></span>
						</div>

					</section>

			</div>

		<!-- Scripts -->
			<script src="assets/js/jquery.min.js"></script>
			<script>
				let slideIndex = 1;
				showSlides(slideIndex);

				function plusSlides(n) {
				  showSlides(slideIndex += n);
				}

				function currentSlide(n) {
				  showSlides(slideIndex = n);
				}

				function showSlides(n) {
				  let i;
				  let slides = document.getElementsByClassName("slide");
				  let dots = document.getElementsByClassName("dot");
				  if (n > slides.length) {slideIndex = 1}    
				  if (n < 1) {slideIndex = slides.length}
				  for (i = 0; i < slides.length; i++) {
					  slides[i].style.display = "none";  
				  }
				  for (i = 0; i < dots.length; i++) {
					  dots[i].className = dots[i].className.replace(" active", "");
				  }
				  slides[slideIndex-1].style.display = "block";  
				  dots[slideIndex-1].className += " active";
				}
			</script>

		<!-- Optional CSS -->
			<style>
				.slideshow-container {
				  position: relative;
				  margin: auto;
				  max-width: 800px;
				}

				.slide {
				  display: none;
				}

				.fade {
				  animation-name: fade;
				  animation-duration: 1.5s;
				}

				@keyframes fade {
				  from {opacity: .4} 
				  to {opacity: 1}
				}

				.prev, .next {
				  cursor: pointer;
				  position: absolute;
				  top: 50%;
				  width: auto;
				  padding: 16px;
				  margin-top: -22px;
				  color: white;
				  font-weight: bold;
				  font-size: 18px;
				  transition: 0.6s ease;
				  border-radius: 0 3px 3px 0;
				  user-select: none;
				}

				.next {
				  right: 0;
				  border-radius: 3px 0 0 3px;
				}

				.text {
				  color: #f2f2f2;
				  font-size: 15px;
				  padding: 8px 12px;
				  position: absolute;
				  bottom: 8px;
				  width: 100%;
				  text-align: center;
				}

				.dot {
				  cursor: pointer;
				  height: 15px;
				  width: 15px;
				  margin: 0 2px;
				  background-color: #bbb;
				  border-radius: 50%;
				  display: inline-block;
				  transition: background-color 0.6s ease;
				}

				.active, .dot:hover {
				  background-color: #717171;
				}
			</style>

	</body>
</html>
