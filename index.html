<!DOCTYPE HTML>
<html>
<head>
    <title>Igor Szuniewicz - Portfolio</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
    <link rel="stylesheet" href="assets/css/main.css" />
    <noscript><link rel="stylesheet" href="assets/css/noscript.css" /></noscript>
    <style>
        .slideshow-container {
            position: relative;
            margin: 2em auto;
            max-width: 100%;
            overflow: hidden;
        }

        .slide {
            position: absolute;
            width: 100%;
            opacity: 0;
            transition: opacity 1s ease-in-out;
        }

        .active-slide {
            opacity: 1;
        }

        .prev, .next {
            cursor: pointer;
            position: absolute;
            top: 50%;
            width: auto;
            padding: 1em;
            color: white;
            font-weight: bold;
            font-size: 1.5em;
            background-color: rgba(0, 0, 0, 0.5);
            border: none;
            border-radius: 5px;
            transition: background-color 0.3s;
            user-select: none;
        }

        .prev:hover, .next:hover {
            background-color: rgba(0, 0, 0, 0.8);
        }

        .prev {
            left: 10px;
        }

        .next {
            right: 10px;
        }

        .slide-caption {
            text-align: center;
            padding-top: 0.5em;
            color: white;
            background-color: rgba(0, 0, 0, 0.5);
            padding: 1em;
            border-radius: 5px;
        }
    </style>
</head>
<body class="is-preload">

    <!-- Wrapper -->
    <div id="wrapper">

        <!-- Header -->
        <header id="header">
            <div class="logo">
                <span class="icon fa-gem"></span>
            </div>
            <div class="content">
                <div class="inner">
                    <h1>Igor Szuniewicz</h1>
                    <p>Sound Designer | Audio Technician | Game Sound Integrator | Composer</p>
                </div>
            </div>
            <nav>
                <ul>
                    <li><a href="#intro">Intro</a></li>
                    <li><a href="#work">Work</a></li>
                    <li><a href="#about">About</a></li>
                    <li><a href="#contact">Contact</a></li>
                </ul>
            </nav>
        </header>

        <!-- Main -->
        <div id="main">

            <!-- Intro -->
            <article id="intro">
                <section class="slideshow-container">
                    <div class="slide active-slide">
                        <img src="path/to/your/image1.jpg" alt="Slide 1">
                        <div class="slide-caption">Caption for Slide 1</div>
                    </div>
                    <div class="slide">
                        <img src="path/to/your/image2.jpg" alt="Slide 2">
                        <div class="slide-caption">Caption for Slide 2</div>
                    </div>
                    <!-- Add more slides as needed -->
                    <a class="prev" onclick="changeSlide(-1)">&#10094;</a>
                    <a class="next" onclick="changeSlide(1)">&#10095;</a>
                </section>
            </article>

        </div>

        <!-- Footer -->
        <footer id="footer">
            <p class="copyright">&copy; Igor Szuniewicz</p>
        </footer>

    </div>

    <!-- Scripts -->
    <script src="assets/js/jquery.min.js"></script>
    <script src="assets/js/browser.min.js"></script>
    <script src="assets/js/breakpoints.min.js"></script>
    <script src="assets/js/util.js"></script>
    <script src="assets/js/main.js"></script>
    <script>
        let slideIndex = 0;
        const slides = document.getElementsByClassName("slide");

        function showSlide(n) {
            for (let i = 0; i < slides.length; i++) {
                slides[i].classList.remove("active-slide");
            }
            slides[n].classList.add("active-slide");
        }

        function changeSlide(n) {
            slideIndex += n;
            if (slideIndex >= slides.length) slideIndex = 0;
            if (slideIndex < 0) slideIndex = slides.length - 1;
            showSlide(slideIndex);
        }

        // Automatically change slides every 5 seconds
        setInterval(() => {
            changeSlide(1);
        }, 5000);
    </script>
</body>
</html>
